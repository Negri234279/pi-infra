; PgBouncer for the shared Postgres — transaction pooling, zero per-app config.
;
; Wildcard `*` routes any database name straight to the shared Postgres, and
; `auth_query` delegates password verification to Postgres (via the SECURITY
; DEFINER function the provisioner installs). So when the provisioner creates a
; new app's role+db, that app can connect through PgBouncer immediately — nothing
; here changes. The only credential PgBouncer itself needs is `pgbouncer_auth`
; (in userlist.txt, written by pgbouncer-init from $PGBOUNCER_AUTH_PASSWORD).
;
; Migrations must NOT use this pooler: the migrator holds a session-level
; pg_advisory_lock, which transaction pooling breaks — apps point their migration
; runner at postgres:5432 directly (MIGRATIONS_DATABASE_URL).

[databases]
* = host=postgres port=5432 auth_user=pgbouncer_auth

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Client auth → verified against the hash returned by auth_query.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer-secrets/userlist.txt
auth_user = pgbouncer_auth
; Always run auth_query in the maintenance db (function lives there once).
auth_dbname = postgres
auth_query = SELECT p_user, p_password FROM pgbouncer.get_auth($1)

pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 0
reserve_pool_size = 5
; node-postgres / drizzle send this; harmless to ignore in transaction mode.
ignore_startup_parameters = extra_float_digits

admin_users = pgbouncer_auth
stats_users = pgbouncer_auth
