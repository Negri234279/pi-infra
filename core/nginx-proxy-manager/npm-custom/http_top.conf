# Copy to NPM:  /data/nginx/custom/http_top.conf
# Included at the top of nginx's http {} block. Defines the log format the
# exporter parses. MUST stay identical to `format` in exporter-config.yml.
log_format nginxlog '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time';
