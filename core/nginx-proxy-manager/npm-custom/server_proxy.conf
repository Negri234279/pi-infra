# Copy to NPM:  /data/nginx/custom/server_proxy.conf
# Included at the end of EVERY proxy-host server {} block, so this single file
# enables the combined log for all hosts — no per-host editing. It's an extra
# access_log: NPM's own per-host logs keep working alongside it.
access_log /data/logs/all_proxy_access.log nginxlog;
