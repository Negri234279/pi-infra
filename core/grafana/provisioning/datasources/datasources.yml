apiVersion: 1

# Grafana talks to each Prometheus DIRECTLY over the shared `monitoring`
# network, by container/service DNS name. The infra one lives in this stack;
# each app's Prometheus lives in the app's repo and joins the same network.

datasources:
  # --- Infra: the Pi host + all containers (this stack's Prometheus) ---
  - name: Infra
    uid: prometheus-infra
    type: prometheus
    access: proxy
    url: http://prometheus-infra:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

  # --- Alertmanager (so Grafana's Alerting UI shows firing alerts) ---
  - name: Alertmanager
    uid: alertmanager-infra
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false

# Per-app datasources live in their OWN file (Grafana loads every *.yml here),
# synced from each app's repo — e.g. powerlog.yml. Keep this file to the core
# (Infra + Alertmanager) so app syncs never touch it.
