apiVersion: 1

# Grafana talks to each Prometheus DIRECTLY over the shared `monitoring`
# network, by container/service DNS name. The infra one lives in this stack;
# each app's Prometheus lives in the app's repo and joins the same network.

datasources:
  # --- Infra: the Pi host + all containers (this stack's Prometheus) ---
  - name: Infra
    uid: prometheus-infra
    type: prometheus
    access: proxy
    url: http://prometheus-infra:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

  # --- Alertmanager (so Grafana's Alerting UI shows firing alerts) ---
  - name: Alertmanager
    uid: alertmanager-infra
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false

  # --- Per-app template: copy this block per app, change name/uid/url ---
  # The app's compose must join the external `monitoring` network and name its
  # Prometheus service so it resolves here (e.g. `powerlog-prometheus`).
  - name: powerlog
    uid: prometheus-powerlog
    type: prometheus
    access: proxy
    url: http://powerlog-prometheus:9090
    jsonData:
      timeInterval: 15s
