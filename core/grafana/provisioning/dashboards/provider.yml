apiVersion: 1

# Loads every dashboard JSON under /var/lib/grafana/dashboards (mounted from
# ./grafana/dashboards). The JSONs are committed; scripts/fetch-dashboards.sh
# only refreshes the community ones (node-exporter-full, cadvisor).
providers:
  - name: infra
    orgId: 1
    folder: Infra
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
