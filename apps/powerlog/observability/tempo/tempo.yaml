# Single-binary Tempo for powerlog (prod / Pi, filesystem storage).
# ingester/compactor use defaults (Tempo 2.x — keep config minimal).
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

# Derive RED span-metrics + a service graph from incoming spans and push them to
# powerlog's Prometheus via remote-write (started with
# --web.enable-remote-write-receiver in compose.yml).
metrics_generator:
  registry:
    external_labels:
      source: tempo
      app: powerlog
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://powerlog-prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
