# powerlog Alertmanager — routes powerlog's alerts to ITS OWN Discord channel,
# independent from the pi-infra core channel.
#
# The webhook URL is NOT here: powerlog-alertmanager-init writes
# $POWERLOG_DISCORD_WEBHOOK_URL (from powerlog.env) into the file referenced
# below, so no secret lives in git.

route:
  receiver: discord
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts re-notify more often.
    - matchers:
        - severity = "critical"
      repeat_interval: 1h

receivers:
  - name: discord
    discord_configs:
      - webhook_url_file: /etc/alertmanager/secrets/discord_webhook_url
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] powerlog · {{ .CommonLabels.alertname }}'
        message: |-
          {{ range .Alerts }}**{{ .Labels.severity | toUpper }}**
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

# A critical alert silences the matching warning for the same alert.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
