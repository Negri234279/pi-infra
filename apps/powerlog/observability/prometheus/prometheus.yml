# powerlog Prometheus — SINGLE SOURCE shared by dev / staging / prod.
#
# Works in every env because all service names are unified to `powerlog-*`.
# Per-env extras (e.g. dev's local postgres-exporter) are dropped as files into
# scrape.d/ — staging/prod mount an empty scrape.d (their Postgres is the shared
# core DB, scraped by pi-infra's exporter).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: powerlog

rule_files:
  - /etc/prometheus/rules/*.yml

# Per-environment extra scrape jobs (none in staging/prod; dev adds Postgres).
scrape_config_files:
  - /etc/prometheus/scrape.d/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["powerlog-alertmanager:9093"]

scrape_configs:
  - job_name: powerlog-api
    metrics_path: /metrics
    static_configs:
      - targets: ["powerlog-api:4000"]

  - job_name: powerlog-prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Self-health of the observability stack (each service exposes /metrics).
  - job_name: powerlog-loki
    static_configs:
      - targets: ["powerlog-loki:3100"]

  - job_name: powerlog-tempo
    static_configs:
      - targets: ["powerlog-tempo:3200"]

  - job_name: powerlog-alloy
    static_configs:
      - targets: ["powerlog-alloy:12345"]

  - job_name: powerlog-alertmanager
    static_configs:
      - targets: ["powerlog-alertmanager:9093"]
