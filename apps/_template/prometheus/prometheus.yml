# Per-app Prometheus — scrapes ONLY this app's business metrics.
#
# Host/container resource metrics are NOT scraped here: node-exporter + cadvisor in
# the core stack already cover the Pi and every container. Keep this file focused on
# the app's own /metrics endpoint(s).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: myapp

scrape_configs:
  - job_name: myapp
    static_configs:
      - targets: ["myapp:8080"]   # app's /metrics host:port on the private network
